name: Sesame-AG 全自动构建系统（最终稳定版）
run-name: ${{ github.actor }} 触发的构建 | ${{ github.event_name }}

on:
  watch:
    types: [started]

env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets
  TARGET_SOURCE_BRANCH: dev

  # 消除剩余Node版本弃用警告
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # 任务1：同步原仓库代码，检测是否有更新
  sync-upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'watch' }}
    outputs:
      has_update: ${{ steps.check_update.outputs.has_update }}
      change_log: ${{ steps.check_update.outputs.change_log }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          ref: dev

      - name: 配置Git用户信息
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: 添加原仓库上游地址
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git

      - name: 拉取原仓库最新代码
        run: git fetch upstream dev

      # 合并代码并生成完整更新日志
      - name: 合并代码并生成完整更新日志
        id: check_update
        run: |
          BEFORE_SHA=$(git rev-parse HEAD)
          git merge upstream/dev --no-edit -X theirs
          AFTER_SHA=$(git rev-parse HEAD)
          SHORT_AFTER=$(git rev-parse --short "$AFTER_SHA")

          if [ "$BEFORE_SHA" != "$AFTER_SHA" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"

            CHANGE_LOG=$(git log --oneline "${BEFORE_SHA}..${AFTER_SHA}")

            # 多行输出写入GITHUB_OUTPUT
            {
              echo 'change_log<<CHANGE_LOG_EOF'
              echo "$CHANGE_LOG"
              echo 'CHANGE_LOG_EOF'
            } >> "$GITHUB_OUTPUT"

            echo "✅ 检测到原仓库更新，共 $(echo "$CHANGE_LOG" | wc -l) 条提交" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$CHANGE_LOG" | while read -r line; do
              echo "- $line" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "change_log=" >> "$GITHUB_OUTPUT"
            echo "ℹ️ 原仓库无更新，跳过构建" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 推送更新到本地仓库
        if: steps.check_update.outputs.has_update == 'true'
        run: git push origin dev -o ci.skip

  # 任务2：构建APK、签名、发布Release、清理旧版本
  build-and-sign:
    runs-on: ubuntu-latest
    needs: sync-upstream
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare_assets.outputs.version }}
      tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
      build_time: ${{ steps.prepare_assets.outputs.build_time }}
      dev_latest_commit: ${{ steps.prepare_assets.outputs.dev_latest_commit }}
      dev_latest_commit_msg: ${{ steps.prepare_assets.outputs.dev_latest_commit_msg }}
      dev_latest_commit_time: ${{ steps.prepare_assets.outputs.dev_latest_commit_time }}
      main_latest_commit: ${{ steps.prepare_assets.outputs.main_latest_commit }}
      main_latest_commit_msg: ${{ steps.prepare_assets.outputs.main_latest_commit_msg }}
      main_latest_commit_time: ${{ steps.prepare_assets.outputs.main_latest_commit_time }}
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push' ||
       github.event_name == 'watch' ||
       needs.sync-upstream.outputs.has_update == 'true')
    steps:
      - name: 设置时区为上海
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          ref: dev

      - name: 校验工具链版本一致性
        run: |
          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts

      - name: 安装JDK环境
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 配置Gradle的Java路径
        run: echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: 安装Android SDK工具
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: 安装SDK组件并接受协议
        run: |
          sdkmanager --install "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail

      - name: 配置Gradle缓存（加速构建）
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false
          cache-cleanup: on-success

      - name: 赋予Gradle执行权限
        run: chmod +x gradlew

      - name: 执行Release构建
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: 准备待签名的APK文件
        run: |
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done

      - name: 对APK进行签名
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: 显示签名完成的文件列表
        run: |
          echo "## ✅ 成功签名以下APK文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.sign_apks.outputs.signedFiles }}" | tr ':' '\n' | while read -r file; do
            echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY
          done

      - name: 生成SHA256校验文件与版本信息
        id: prepare_assets
        run: |
          mkdir -p "${ASSET_DIR}"
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          for file in "${files[@]}"; do
            cp "${file}" "${ASSET_DIR}/"
            (
              cd "${ASSET_DIR}"
              sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256"
            )
          done

          VERSION=$(sed -n 's/^appVersion=//p' gradle.properties | head -n1 | tr -d '\r')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date '+%Y%m%d')
          echo "tag_name=v${VERSION}-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

          echo "build_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

          # 获取原仓库 main 和 dev 分支的最新提交信息（永远显示原仓库的，不是我们自己的）
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git
          git fetch upstream --quiet
          
          # dev 分支
          DEV_SHA=$(git rev-parse --short upstream/dev)
          DEV_MSG=$(git log --oneline -1 upstream/dev | cut -d' ' -f2-)
          DEV_TIME=$(git log -1 --format="%ci" upstream/dev)
          echo "dev_latest_commit=${DEV_SHA}" >> $GITHUB_OUTPUT
          echo "dev_latest_commit_msg=${DEV_MSG}" >> $GITHUB_OUTPUT
          echo "dev_latest_commit_time=${DEV_TIME}" >> $GITHUB_OUTPUT
          
          # main 分支
          MAIN_SHA=$(git rev-parse --short upstream/main)
          MAIN_MSG=$(git log --oneline -1 upstream/main | cut -d' ' -f2-)
          MAIN_TIME=$(git log -1 --format="%ci" upstream/main)
          echo "main_latest_commit=${MAIN_SHA}" >> $GITHUB_OUTPUT
          echo "main_latest_commit_msg=${MAIN_MSG}" >> $GITHUB_OUTPUT
          echo "main_latest_commit_time=${MAIN_TIME}" >> $GITHUB_OUTPUT

      # ✅ 修复：用shell脚本生成Release说明文件，避免YAML多行字符串问题
      - name: 生成Release说明文件
        env:
          VERSION: ${{ steps.prepare_assets.outputs.version }}
          BUILD_TIME: ${{ steps.prepare_assets.outputs.build_time }}
          EVENT_NAME: ${{ github.event_name }}
          DEV_LATEST_COMMIT: ${{ steps.prepare_assets.outputs.dev_latest_commit }}
          DEV_LATEST_COMMIT_MSG: ${{ steps.prepare_assets.outputs.dev_latest_commit_msg }}
          DEV_LATEST_COMMIT_TIME: ${{ steps.prepare_assets.outputs.dev_latest_commit_time }}
          MAIN_LATEST_COMMIT: ${{ steps.prepare_assets.outputs.main_latest_commit }}
          MAIN_LATEST_COMMIT_MSG: ${{ steps.prepare_assets.outputs.main_latest_commit_msg }}
          MAIN_LATEST_COMMIT_TIME: ${{ steps.prepare_assets.outputs.main_latest_commit_time }}
          HAS_UPDATE: ${{ needs.sync-upstream.outputs.has_update }}
          CHANGE_LOG: ${{ needs.sync-upstream.outputs.change_log }}
        run: |
          cat > release-body.md << 'BODY_EOF'
          ## 📦 构建信息
          BODY_EOF

          echo "- 版本号：v${VERSION}" >> release-body.md
          echo "- 构建时间：${BUILD_TIME}" >> release-body.md
          echo "- 触发来源：${EVENT_NAME}" >> release-body.md
          echo "" >> release-body.md
          echo "## 📝 原仓库最新提交" >> release-body.md
          echo "" >> release-body.md
          echo "### dev 分支" >> release-body.md
          echo "- 提交哈希：\`${DEV_LATEST_COMMIT}\`" >> release-body.md
          echo "- 提交说明：${DEV_LATEST_COMMIT_MSG}" >> release-body.md
          echo "- 提交时间：${DEV_LATEST_COMMIT_TIME}" >> release-body.md
          echo "" >> release-body.md
          echo "### main 分支" >> release-body.md
          echo "- 提交哈希：\`${MAIN_LATEST_COMMIT}\`" >> release-body.md
          echo "- 提交说明：${MAIN_LATEST_COMMIT_MSG}" >> release-body.md
          echo "- 提交时间：${MAIN_LATEST_COMMIT_TIME}" >> release-body.md

          if [ "$HAS_UPDATE" == "true" ]; then
            echo "" >> release-body.md
            echo "## 📥 本次同步更新（全部提交）" >> release-body.md
            echo "" >> release-body.md
            echo "$CHANGE_LOG" | while read -r line; do
              echo "- $line" >> release-body.md
            done
          fi

          cat >> release-body.md << 'BODY_EOF'

          ## 📱 下载说明
          | 架构版本 | 适用设备 |
          |--------|----------|
          | `universal` | ✅ 推荐所有用户使用，兼容全部安卓设备 |
          | `arm64-v8a` | 64位ARM架构，绝大多数新款安卓手机 |
          | `armeabi-v7a` | 32位ARM架构，老旧安卓设备 |
          | `x86_64` | 64位x86架构，部分安卓模拟器 |
          | `x86` | 32位x86架构，极少老旧模拟器 |

          > 安装完成后，请在LSPosed框架中激活模块并重启设备生效。
          BODY_EOF

          echo "✅ Release说明文件已生成"
          echo "--- 内容预览 ---"
          cat release-body.md
          echo "--- 预览结束 ---"

      - name: 创建GitHub Release（所有APK单独展示 + 完整更新日志）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
          name: Sesame-AG v${{ steps.prepare_assets.outputs.version }}
          make_latest: true
          generate_release_notes: false
          files: |
            ${{ env.ASSET_DIR }}/*.apk
            ${{ env.ASSET_DIR }}/*.sha256
          body_path: release-body.md

      - name: 清理旧版本（保留最近10个）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_LATEST: 10
        run: |
          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases?per_page=100" | \
            jq -r '.[] | select(.tag_name | startswith("v")) | .id + " " + .tag_name' | \
            sort -r)

          count=$(echo "$releases" | wc -l)
          delete_count=$((count - KEEP_LATEST))

          if [ $delete_count -le 0 ]; then
            echo "ℹ️ 当前只有 $count 个版本，无需清理"
            exit 0
          fi

          echo "🗑️ 共 $count 个版本，保留最近 $KEEP_LATEST 个，删除 $delete_count 个旧版本"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "$releases" | tail -n $delete_count | while read -r release_id tag_name; do
            echo "  删除版本: $tag_name" >> "$GITHUB_STEP_SUMMARY"
            curl -s -f -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/$release_id" || true
            curl -s -f -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/git/refs/tags/$tag_name" || true
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ 旧版本清理完成" >> "$GITHUB_STEP_SUMMARY"

  # 任务3：发送邮件通知（带完整更新日志）
  notify-email:
    runs-on: ubuntu-latest
    needs: [ sync-upstream, build-and-sign ]
    if: ${{ always() && needs.build-and-sign.result != 'skipped' }}
    steps:
      # ✅ 修复：用shell脚本生成邮件内容，避免YAML多行字符串问题
      - name: 生成邮件内容
        id: gen_email
        env:
          BUILD_RESULT: ${{ needs.build-and-sign.result }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          TAG_NAME: ${{ needs.build-and-sign.outputs.tag_name }}
          VERSION: ${{ needs.build-and-sign.outputs.version }}
          BUILD_TIME: ${{ needs.build-and-sign.outputs.build_time }}
          DEV_LATEST_COMMIT: ${{ needs.build-and-sign.outputs.dev_latest_commit }}
          DEV_LATEST_COMMIT_MSG: ${{ needs.build-and-sign.outputs.dev_latest_commit_msg }}
          DEV_LATEST_COMMIT_TIME: ${{ needs.build-and-sign.outputs.dev_latest_commit_time }}
          MAIN_LATEST_COMMIT: ${{ needs.build-and-sign.outputs.main_latest_commit }}
          MAIN_LATEST_COMMIT_MSG: ${{ needs.build-and-sign.outputs.main_latest_commit_msg }}
          MAIN_LATEST_COMMIT_TIME: ${{ needs.build-and-sign.outputs.main_latest_commit_time }}
          HAS_UPDATE: ${{ needs.sync-upstream.outputs.has_update }}
          CHANGE_LOG: ${{ needs.sync-upstream.outputs.change_log }}
        run: |
          if [ "$BUILD_RESULT" == "success" ]; then
            SUBJECT="✅ Sesame-AG 新版本构建发布成功"
            {
              echo "🎉 Sesame-AG 新版本已成功构建并发布！"
              echo ""
              echo "🔗 下载地址：${SERVER_URL}/${REPOSITORY}/releases/tag/${TAG_NAME}"
              echo ""
              echo "📦 版本信息"
              echo "- 版本号：${VERSION}"
              echo "- 构建时间：${BUILD_TIME}"
              echo ""
              echo "📝 原仓库最新提交"
              echo ""
              echo "【dev 分支】"
              echo "- 提交哈希：${DEV_LATEST_COMMIT}"
              echo "- 提交说明：${DEV_LATEST_COMMIT_MSG}"
              echo "- 提交时间：${DEV_LATEST_COMMIT_TIME}"
              echo ""
              echo "【main 分支】"
              echo "- 提交哈希：${MAIN_LATEST_COMMIT}"
              echo "- 提交说明：${MAIN_LATEST_COMMIT_MSG}"
              echo "- 提交时间：${MAIN_LATEST_COMMIT_TIME}"
            } > email-body.txt
          else
            SUBJECT="❌ Sesame-AG 构建失败"
            {
              echo "❌ Sesame-AG 构建流程出现失败，请查看详情排查。"
              echo ""
              echo "🔗 错误日志：${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
              echo ""
              echo "🚨 常见失败原因"
              echo "1. 配置文件语法错误"
              echo "2. 依赖下载失败（网络问题）"
              echo "3. 签名密钥配置错误"
              echo "4. 原仓库代码变更导致编译失败"
              echo ""
              echo "🔧 排查建议"
              echo "点击上方链接进入构建详情，查看红色报错步骤的具体日志"
              echo "若为网络问题，点击右上角「Re-run jobs」重新执行即可"
            } > email-body.txt
          fi

          if [ "$HAS_UPDATE" == "true" ]; then
            echo "" >> email-body.txt
            echo "📥 本次同步全部提交" >> email-body.txt
            echo "$CHANGE_LOG" | while read -r line; do
              echo "- $line" >> email-body.txt
            done
          fi

          echo "subject=${SUBJECT}" >> "$GITHUB_OUTPUT"
          echo "✅ 邮件内容已生成"

      - name: 发送构建结果邮件
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_RECEIVER }}
          from: GitHub Actions 自动构建
          subject: ${{ steps.gen_email.outputs.subject }}
          body: file://email-body.txt

  # 任务4：构建失败摘要补充
  notify-failure:
    runs-on: ubuntu-latest
    needs: [ sync-upstream, build-and-sign ]
    if: ${{ failure() }}
    steps:
      - name: 输出失败提示
        run: |
          echo "## ❌ 构建执行失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请点击左侧失败的任务步骤，查看红色报错的详细日志信息。" >> $GITHUB_STEP_SUMMARY
          echo "若为网络/临时环境问题，可点击右上角「Re-run all jobs」重试。" >> $GITHUB_STEP_SUMMARY
